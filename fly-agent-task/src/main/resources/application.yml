server:
  port: 8082

spring:
  application:
    name: fly-agent-task
  profiles:
    active: dev
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://51.161.15.134:3307/fly_agent?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456789}
    druid:
      validation-query: SELECT 1
      test-on-borrow: true
      test-while-idle: true
      test-on-return: false
      keep-alive: true
      time-between-eviction-runs-millis: 30000
      min-evictable-idle-time-millis: 60000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

swe:
  toolkit-root: ${SWE_TOOLKIT_ROOT:tools/swe-pro-production}
  production-root: ${SWE_PRODUCTION_ROOT:swe-output}
  qwen-attempts: ${SWE_QWEN_ATTEMPTS:4}
  opus-attempts: ${SWE_OPUS_ATTEMPTS:8}
  qwen-max-steps-schedule: ${SWE_QWEN_MAX_STEPS_SCHEDULE:100,80,10,10}
  opus-max-steps-schedule: ${SWE_OPUS_MAX_STEPS_SCHEDULE:180,50,10}
  model-timeout-seconds: ${SWE_MODEL_TIMEOUT_SECONDS:3600}
  swe-agent:
    root: ${SWE_AGENT_ROOT:tools/SWE-agent}
    maxSteps: ${SWE_AGENT_MAX_STEPS:20}
  github:
    token: ${GITHUB_TOKEN:}
  qwen:
    base-url: ${SWE_QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    token: ${SWE_QWEN_TOKEN:}
    model: ${SWE_QWEN_MODEL:qwen3.6-plus}
    provider: openai
    max-tokens: ${SWE_QWEN_MAX_TOKENS:8192}
    max-input-tokens: ${SWE_QWEN_MAX_INPUT_TOKENS:22000}
    temperature: ${SWE_QWEN_TEMPERATURE:0.7}
  opus:
    base-url: ${SWE_OPUS_BASE_URL:https://ai.yiqiu.dev/v1}
    token: ${SWE_OPUS_TOKEN:}
    model: ${SWE_OPUS_MODEL:claude-opus-4-7}
    provider: openai
    max-tokens: ${SWE_OPUS_MAX_TOKENS:8192}
    max-input-tokens: ${SWE_OPUS_MAX_INPUT_TOKENS:22000}
    temperature: ${SWE_OPUS_TEMPERATURE:0.7}

agent:
  zhipu:
    api-key: ${ZHIPU_API_KEY:}
    model: ${ZHIPU_MODEL:glm-5}
    temperature: ${ZHIPU_TEMPERATURE:0.7}
    max-tokens: ${ZHIPU_MAX_TOKENS:2000}

# XXL-Job 配置
xxl:
  job:
    admin:
      # XXL-Job Admin 调度中心地址
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://51.161.15.134:9090/xxl-job-admin}
    # 访问令牌（建议生产环境修改）
    accessToken: ${XXL_JOB_ACCESS_TOKEN:default_token}
    executor:
      # 执行器 AppName（用于注册到调度中心）
      appname: ${XXL_JOB_EXECUTOR_APPNAME:fly-agent-executor}
      # 执行器注册地址（为空则自动获取）
      address: ${XXL_JOB_EXECUTOR_ADDRESS:}
      # 执行器 IP（为空则自动获取）
      ip: ${XXL_JOB_EXECUTOR_IP:}
      # 执行器端口
      port: ${XXL_JOB_EXECUTOR_PORT:9999}
      # 执行器日志文件路径
      logpath: ${XXL_JOB_EXECUTOR_LOGPATH:/data/applogs/xxl-job/jobhandler}
      # 执行器日志保留天数
      logretentiondays: ${XXL_JOB_EXECUTOR_LOG_RETENTION_DAYS:30}
